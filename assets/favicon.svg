<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#2c1810" rx="15"/>
  
  <!-- Book -->
  <rect x="25" y="30" width="50" height="45" fill="#8b4513" rx="2"/>
  <rect x="27" y="32" width="46" height="41" fill="#f4e4c1" rx="1"/>
  
  <!-- Book spine -->
  <line x1="50" y1="30" x2="50" y2="75" stroke="#8b4513" stroke-width="2"/>
  
  <!-- Pages lines -->
  <line x1="30" y1="40" x2="47" y2="40" stroke="#2c1810" stroke-width="1" opacity="0.3"/>
  <line x1="30" y1="45" x2="47" y2="45" stroke="#2c1810" stroke-width="1" opacity="0.3"/>
  <line x1="30" y1="50" x2="47" y2="50" stroke="#2c1810" stroke-width="1" opacity="0.3"/>
  <line x1="53" y1="40" x2="70" y2="40" stroke="#2c1810" stroke-width="1" opacity="0.3"/>
  <line x1="53" y1="45" x2="70" y2="45" stroke="#2c1810" stroke-width="1" opacity="0.3"/>
  <line x1="53" y1="50" x2="70" y2="50" stroke="#2c1810" stroke-width="1" opacity="0.3"/>
  
  <!-- Moon (representing "γιαγιά's stories at night") -->
  <circle cx="75" cy="25" r="8" fill="#f4e4c1" opacity="0.9"/>
  <circle cx="78" cy="23" r="7" fill="#2c1810"/>
</svg>