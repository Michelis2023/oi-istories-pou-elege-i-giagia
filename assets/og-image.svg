<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c1810;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0f0a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative moon in background -->
  <circle cx="950" cy="150" r="120" fill="#3a2417" opacity="0.3"/>
  
  <!-- Main title -->
  <text x="600" y="200" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="#f4e4c1" text-anchor="middle">
    Οι ιστορίες που έλεγε η γιαγιά
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="270" font-family="Georgia, serif" font-size="36" fill="#d4a574" text-anchor="middle">
    Λαϊκά και παραδοσιακά διηγήματα
  </text>
  
  <!-- Divider line -->
  <line x1="300" y1="320" x2="900" y2="320" stroke="#8b4513" stroke-width="3"/>
  
  <!-- Description -->
  <text x="600" y="380" font-family="Georgia, serif" font-size="28" fill="#d4c4a8" text-anchor="middle">
    16 διηγήματα από τη Γορτυνία Αρκαδίας
  </text>
  
  <text x="600" y="425" font-family="Georgia, serif" font-size="28" fill="#d4c4a8" text-anchor="middle">
    Ιστορικές μνήμες • Θρησκευτικά έθιμα • Λαϊκή σοφία
  </text>
  
  <!-- Author -->
  <text x="600" y="520" font-family="Georgia, serif" font-size="32" font-style="italic" fill="#8b4513" text-anchor="middle">
    Μιχαήλ Σωτηρίου Μιχαλακόπουλος
  </text>
  
  <!-- Decorative book icon -->
  <g transform="translate(150, 450)">
    <path d="M 0 0 Q 40 5 80 0 L 80 60 Q 40 65 0 60 Z" fill="#f4e4c1" stroke="#8b4513" stroke-width="2"/>
    <line x1="40" y1="0" x2="40" y2="60" stroke="#8b4513" stroke-width="2"/>
    <line x1="10" y1="20" x2="35" y2="20" stroke="#8b4513" stroke-width="1" opacity="0.6"/>
    <line x1="10" y1="28" x2="35" y2="28" stroke="#8b4513" stroke-width="1" opacity="0.6"/>
    <line x1="10" y1="36" x2="35" y2="36" stroke="#8b4513" stroke-width="1" opacity="0.6"/>
    <line x1="45" y1="20" x2="70" y2="20" stroke="#8b4513" stroke-width="1" opacity="0.6"/>
    <line x1="45" y1="28" x2="70" y2="28" stroke="#8b4513" stroke-width="1" opacity="0.6"/>
    <line x1="45" y1="36" x2="70" y2="36" stroke="#8b4513" stroke-width="1" opacity="0.6"/>
  </g>
  
  <!-- Decorative moon crescent -->
  <g transform="translate(970, 450)">
    <circle cx="0" cy="0" r="40" fill="#d4a574"/>
    <circle cx="8" cy="-5" r="35" fill="#2c1810"/>
  </g>
</svg>