<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with warm traditional gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c1810;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a2f1a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.5"/>
    </filter>
    <pattern id="paper" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#f4e4c1" opacity="0.05"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#paper)"/>
  
  <!-- Decorative traditional border -->
  <rect x="30" y="30" width="1140" height="570" 
        fill="none" stroke="#8b4513" stroke-width="6" opacity="0.6"/>
  
  <!-- Inner ornate frame -->
  <rect x="50" y="50" width="1100" height="530" 
        fill="none" stroke="#d4a574" stroke-width="3" opacity="0.5"/>
  
  <!-- Title -->
  <text x="600" y="160" 
        font-family="Georgia, serif" 
        font-size="64" 
        font-weight="bold" 
        fill="#f4e4c1" 
        text-anchor="middle" 
        filter="url(#shadow)">
    Οι ιστορίες που έλεγε η γιαγιά
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="230" 
        font-family="Georgia, serif" 
        font-size="36" 
        fill="#d4a574" 
        text-anchor="middle" 
        font-style="italic">
    Λαϊκά και παραδοσιακά διηγήματα
  </text>
  
  <!-- Decorative line -->
  <line x1="300" y1="270" x2="900" y2="270" 
        stroke="#8b4513" stroke-width="2" opacity="0.5"/>
  
  <!-- Content description -->
  <text x="600" y="340" 
        font-family="Georgia, serif" 
        font-size="28" 
        fill="#f4e4c1" 
        text-anchor="middle">
    Από τη Γορτυνία Αρκαδίας
  </text>
  
  <!-- Author -->
  <text x="600" y="420" 
        font-family="Georgia, serif" 
        font-size="32" 
        fill="#d4c4a8" 
        text-anchor="middle" 
        font-weight="bold">
    Μιχαήλ Σωτηρίου Μιχαλακόπουλος
  </text>
  
  <!-- Traditional symbols -->
  <text x="80" y="110" font-size="70" fill="#8b4513" opacity="0.3">🏛️</text>
  <text x="1070" y="110" font-size="70" fill="#8b4513" opacity="0.3">📖</text>
  <text x="80" y="570" font-size="70" fill="#8b4513" opacity="0.3">⛪</text>
  <text x="1070" y="570" font-size="70" fill="#8b4513" opacity="0.3">🌾</text>
  
  <!-- Footer info -->
  <text x="600" y="500" 
        font-family="Georgia, serif" 
        font-size="24" 
        fill="#d4c4a8" 
        text-anchor="middle">
    16 διηγήματα • Θρησκευτική παράδοση • Ιστορικές μνήμες
  </text>
  
  <text x="600" y="545" 
        font-family="Georgia, serif" 
        font-size="20" 
        fill="#a08060" 
        text-anchor="middle">
    michelis2023.github.io/oi-istories-pou-elege-i-giagia
  </text>
</svg>